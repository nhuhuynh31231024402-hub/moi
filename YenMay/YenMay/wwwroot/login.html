<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Noto+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/style-login.css">
</head>
<body>
    <div id="signin-target"></div>
    <div id="forgot-password-target"></div>
    <div class="main-grid">

        <div class="image-section">
            <img src="./images/logo.png" alt="Logo" class="logo">
            <div class="description">
                <p class="title">CHÀO MỪNG ĐẾN VỚI CHÚNG TÔI</p>
                <p class="subtitle">Đăng nhập để trải nghiệm tốt nhất.</p>
            </div>
        </div>


        <div class="form-section">
            <div class="form-container">
                <!-- FORM ĐĂNG NHẬP -->
                <div class="form signin">
                    <div class="form-content">
                        <form id="signin-form">
                            <h2>ĐĂNG NHẬP</h2>

                            <label for="signin-email">Email</label>
                            <input type="email" id="signin-email" name="email" placeholder="Nhập email của bạn" required>
                            <label for="signin-password">Mật khẩu</label>
                            <input type="password" id="signin-password" name="password" placeholder="Nhập mật khẩu của bạn" required>
                            <label>
                                <input type="checkbox" name="remember"> Ghi nhớ tôi
                            </label>
                            <button type="submit">Đăng nhập</button>
                            <p>Hoặc đăng nhập với</p>
                            <div class="social-buttons">
                                <button type="button" class="social-button google"><i class="fab fa-google"></i></button>
                                <button type="button" class="social-button tiktok"><i class="fa-brands fa-tiktok"></i></i></button>
                                <button type="button" class="social-button facebook"><i class="fab fa-facebook"></i></button>
                                <button type="button" class="social-button twitter"><i class="fab fa-twitter"></i></button>
                            </div>
                            <p><a href="#forgot-password-target" style="text-decoration: none;">Quên mật khẩu?</a></p>
                            <p>Chưa có tài khoản? <a href="register.html" style="text-decoration: none;">Đăng ký</a></p>
                            <button type="button" id="back-to-home" class="back-button"><i class="fas fa-arrow-left"></i> Trở về</button>

                        </form>
                    </div>
                </div>
                <!-- FORM QUÊN MẬT KHẨU / ĐỔI MẬT KHẨU -->
                <div class="form forgot-password">
                    <div class="form-content">
                        <form id="forgot-password-form">
                            <h2>QUÊN MẬT KHẨU</h2>
                            <p>Vui lòng nhập email để đặt lại mật khẩu.</p>
                            <label for="forgot-email">Email *</label>
                            <input type="email" id="forgot-email" name="email" placeholder="Nhập email của bạn" required>
                            <button type="submit" id="forgot-submit">Tiếp tục</button>

                            <!-- Phần đổi mật khẩu, ẩn ban đầu -->
                            <div id="reset-section" style="display:none; margin-top:1em;">
                                <label for="new-password">Mật khẩu mới</label>
                                <input type="password" id="new-password" name="new-password" placeholder="Nhập mật khẩu mới">
                                <label for="confirm-password">Xác nhận mật khẩu</label>
                                <input type="password" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu mới">
                                <button type="button" id="reset-button">Đổi mật khẩu</button>
                            </div>

                            <p><a href="#signin-target" style="text-decoration: none;">Quay lại đăng nhập</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer id="site-footer">
        <!-- TODO: Thêm nội dung footer -->
    </footer>

    <script src="js/shared.js"></script>
    <script src="js/login.js"></script>
    <script type="module" src="js/googlelog.js"></script>

</body>
</html>
