<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Noto+Sans&display=swap" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="css/style-register.css" />
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

</head>

<body>
    <header id="site-header"></header>

    <div class="main-grid">
        <div class="form-section">


            <div class="form-container">
                <h2>ĐĂNG KÝ</h2>
                <form id="signup-form" novalidate>
                    <label for="name">Họ và Tên</label>
                    <input type="text" id="name" name="name" placeholder="Nhập họ và tên" required />

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập email" required />

                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required />
                    <label for="confirm-password">Xác nhận mật khẩu</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Xác nhận mật khẩu" required />
                    <div id="password-error">Mật khẩu không khớp</div>

                    <!-- Container reCAPTCHA -->
                    <div id="captcha-container">
                        <div class="g-recaptcha" data-sitekey="6Ld59ikrAAAAAD01HWcPhhF8BCGPEWbR9_--KXtf"></div>
                    </div>
                    <label class="terms-checkbox" for="agree">
                        <input type="checkbox" id="agree" name="agree" required />
                        Tôi đồng ý với các điều khoản & điều kiện
                    </label>
                    <button type="submit" class="btn">Đăng ký</button>
                    <p class="alt">Hoặc đăng ký với</p>
                    <div class="social-buttons">
                        <button type="button" class="social-button google"><i class="fab fa-google"></i></button>
                        <button type="button" class="social-button tiktok"><i class="fa-brands fa-tiktok"></i></button>
                        <button type="button" class="social-button facebook"><i class="fab fa-facebook"></i></button>
                        <button type="button" class="social-button twitter"><i class="fab fa-twitter"></i></button>
                    </div>

                    <p class="switch">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
                    <button id="back-to-home" class="back-button"><i class="fas fa-arrow-left"></i> Trở về</button>
                </form>
            </div>
        </div>
        <div class="image-section">
            <img src="./images/logo.png" alt="Decoration" class="logo" />
            <div class="description">
                <p class="title">CHÀO MỪNG ĐẾN VỚI CHÚNG TÔI</p>
                <p class="subtitle">Đăng ký để trải nghiệm tốt nhất</p>
            </div>
        </div>
    </div>

    <footer id="site-footer"></footer>
    <script src="js/register.js"></script>
    <script type="module" src="js/googleRegister.js"></script>
    <script src="js/shared.js"></script>

</body>
</html>
